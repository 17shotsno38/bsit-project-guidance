<div class="analytics-wrapper">
  <div class="analytics-header">
    <h1 class="analytics-title">Booking Analytics</h1>
    <p class="analytics-sub">Visualizing the generated statistics for student guidance sessions.</p>
  </div>

  <div class="charts-stack">

    <!-- DAILY REPORT -->
    <div class="chart-card">
      <div class="chart-card-header">
        <h2 class="chart-card-title">Daily Statistics</h2>
        <button (click)="exportDailyCSV()" class="btn-export">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
          Export Report
        </button>
      </div>

      <div *ngIf="dailyChartData.length === 0" class="chart-empty">
        No recent daily bookings found.
      </div>

      <div *ngIf="dailyChartData.length > 0" class="chart-bars">
        <div *ngFor="let data of dailyChartData" class="bar-col">
          <div class="bar-count green">{{ data.count }}</div>
          <div class="bar green-bar" [style.height.%]="data.count * 10"></div>
        </div>
      </div>

      <div *ngIf="dailyChartData.length > 0" class="chart-labels">
        <div *ngFor="let data of dailyChartData" class="chart-label">{{ data.date }}</div>
      </div>
    </div>

    <!-- MONTHLY REPORT -->
    <div class="chart-card">
      <div class="chart-card-header">
        <h2 class="chart-card-title">Monthly Statistics</h2>
        <button (click)="exportMonthlyCSV()" class="btn-export">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
          Export Report
        </button>
      </div>

      <div *ngIf="monthlyChartData.length === 0" class="chart-empty">
        No monthly bookings found.
      </div>

      <div *ngIf="monthlyChartData.length > 0" class="chart-bars">
        <div *ngFor="let data of monthlyChartData" class="bar-col">
          <div class="bar-count gold">{{ data.count }}</div>
          <div class="bar gold-bar" [style.height.%]="data.count * 5"></div>
        </div>
      </div>

      <div *ngIf="monthlyChartData.length > 0" class="chart-labels">
        <div *ngFor="let data of monthlyChartData" class="chart-label">{{ data.month }}</div>
      </div>
    </div>

  </div>
</div>
