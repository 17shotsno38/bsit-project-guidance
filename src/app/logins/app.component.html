<div class="login-wrapper">
  <!-- Left Panel -->
  <div class="left-panel">
    <div class="overlay"></div>
    <div class="left-content">
      <div class="brand">
        <div class="brand-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="10" r="4" stroke="white" stroke-width="2"/>
            <path d="M12 2C7.03 2 3 6.03 3 11c0 5.25 7.5 12 9 13.5C13.5 23 21 16.25 21 11c0-4.97-4.03-9-9-9z" stroke="white" stroke-width="2" fill="none"/>
            <circle cx="12" cy="10" r="2" fill="white"/>
          </svg>
        </div>
        <span class="brand-name">Liceo De Cagayan University</span>
      </div>

      <div class="hero-text">
        <h1>Guidance Office<br />Booking Portal</h1>
      </div>

      <p class="tagline">Guidance Counseling office of Liceo de Cagayan University</p>

      <div class="slide-dots">
        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="right-panel">
    <div class="form-container">
      <div class="form-header">
        <h2>Welcome Back</h2>
        <p>Guidance Counseling Center Login</p>
      </div>

      <div class="form-body">
        <div class="form-group">
          <label for="email">Email or Student ID</label>
          <input
            type="text"
            id="email"
            name="email"
            [(ngModel)]="email"
            autocomplete="username"
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input
              [type]="showPassword ? 'text' : 'password'"
              id="password"
              name="password"
              [(ngModel)]="password"
              autocomplete="current-password"
            />
            <button class="toggle-password" type="button" (click)="togglePassword()">
              <svg *ngIf="!showPassword" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg *ngIf="showPassword" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" [(ngModel)]="rememberMe" />
            <span class="checkmark"></span>
            <span>Remember Me</span>
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <button class="btn-signin" (click)="onSignIn()">Sign In</button>

        <div class="divider">
          <span></span>
          <span></span>
        </div>

        <p class="register-prompt">
          New student? <a href="#">Register for an account</a>
        </p>
      </div>
    </div>
  </div>
</div>
