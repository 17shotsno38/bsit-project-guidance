<div class="page-header">
  <div>
    <h1 class="welcome-title">Scheduled Appointments</h1>
    <p class="welcome-sub">View and manage all student appointments here.</p>
  </div>
</div>

<div class="sessions-card" style="margin-top: 24px;">
  <div class="session-item" *ngFor="let session of upcomingSessions" style="padding: 18px;">
    <img class="session-avatar" [src]="session.avatar" [alt]="session.studentName" />
    <div class="session-info">
      <div class="session-name-row">
        <span class="session-name" style="font-size: 16px;">{{ session.studentName }}</span>
        <span class="tag"
          [ngClass]="{'tag-counseling': session.tag === 'COUNSELING', 'tag-academic': session.tag !== 'COUNSELING'}">{{
          session.tag }}</span>
      </div>
      <span class="session-detail">{{ session.detail }}</span>
    </div>
    <div class="session-actions">
      <button class="btn-call" title="Notify Student" (click)="callStudent(session)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
        </svg>
        Call
      </button>
      <button class="btn-reschedule" (click)="reschedule(session)">Reschedule</button>
      <button class="btn-icon-close" title="Cancel" (click)="cancelSession(session)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
    </div>
  </div>

  <div class="empty-sessions" *ngIf="upcomingSessions.length === 0">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="1.5">
      <rect x="3" y="4" width="18" height="18" rx="2" />
      <line x1="16" y1="2" x2="16" y2="6" />
      <line x1="8" y1="2" x2="8" y2="6" />
      <line x1="3" y1="10" x2="21" y2="10" />
    </svg>
    <p>No appointments booked yet.</p>
  </div>
</div>
