<div class="app-shell">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="user-profile">
      <img class="avatar" [src]="profileData?.avatar || 'https://i.pravatar.cc/80?img=47'" [alt]="profileData?.fullName || 'Student'" />
      <div class="user-info">
        <span class="user-name">{{ profileData?.fullName || 'Loading...' }}</span>
        <span class="user-id">Student ID: {{ profileData?.studentId || 'N/A' }}</span>
      </div>
    </div>

    <nav class="nav-menu">
      <a class="nav-item" routerLink="/dashboard" routerLinkActive="active" (click)="navigateTo('/dashboard')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" rx="1" />
          <rect x="14" y="3" width="7" height="7" rx="1" />
          <rect x="3" y="14" width="7" height="7" rx="1" />
          <rect x="14" y="14" width="7" height="7" rx="1" />
        </svg>
        <span>Dashboard</span>
      </a>
      <a class="nav-item" routerLink="/appointments" routerLinkActive="active" (click)="navigateTo('/appointments')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2" />
          <line x1="16" y1="2" x2="16" y2="6" />
          <line x1="8" y1="2" x2="8" y2="6" />
          <line x1="3" y1="10" x2="21" y2="10" />
        </svg>
        <span>Appointments</span>
      </a>
      <a class="nav-item" routerLink="/profile" routerLinkActive="active" (click)="navigateTo('/profile')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
        <span>Profile</span>
      </a>
      <a class="nav-item" routerLink="/analytics" routerLinkActive="active" (click)="navigateTo('/analytics')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"></line>
          <line x1="12" y1="20" x2="12" y2="4"></line>
          <line x1="6" y1="20" x2="6" y2="14"></line>
        </svg>
        <span>Analytics</span>
      </a>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
