<div class="app-shell">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="user-profile">
      <img class="avatar" [src]="profileData?.avatar || 'https://ui-avatars.com/api/?name=' + (profileData?.fullName || 'S') + '&background=random'" [alt]="profileData?.fullName || 'Student'" />
      <div class="user-info">
        <span class="user-name">{{ profileData?.fullName || 'Loading...' }}</span>
        <span class="user-id">Student ID: {{ profileData?.studentId || 'N/A' }}</span>
      </div>
    </div>

    <nav class="nav-menu">
      <a class="nav-item" routerLink="/dashboard" routerLinkActive="active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" rx="1" />
          <rect x="14" y="3" width="7" height="7" rx="1" />
          <rect x="3" y="14" width="7" height="7" rx="1" />
          <rect x="14" y="14" width="7" height="7" rx="1" />
        </svg>
        <span>Dashboard</span>
      </a>
      <a class="nav-item" routerLink="/appointments" routerLinkActive="active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2" />
          <line x1="16" y1="2" x2="16" y2="6" />
          <line x1="8" y1="2" x2="8" y2="6" />
          <line x1="3" y1="10" x2="21" y2="10" />
        </svg>
        <span>Appointments</span>
      </a>
      <a class="nav-item" routerLink="/profile" routerLinkActive="active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
        <span>Profile</span>
      </a>
    </nav>

    <!-- Dark Mode Toggle -->
    <div class="sidebar-bottom-toggle">
      <button class="theme-toggle-btn" (click)="toggleTheme()" [attr.aria-label]="isDark ? 'Switch to light mode' : 'Switch to dark mode'">
        <div class="toggle-track" [class.dark]="isDark">
          <div class="toggle-thumb"></div>
          <svg class="icon-sun" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="icon-moon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </div>
        <span>{{ isDark ? 'Dark Mode' : 'Light Mode' }}</span>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>

<!-- Notification Modal -->
<div class="notification-overlay" *ngIf="notifications.length > 0">
  <div class="notification-modal">
    <div class="modal-header">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#27ae60" stroke-width="2">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
        <polyline points="22 4 12 14.01 9 11.01"></polyline>
      </svg>
      <h2>Guidance Office Alert</h2>
    </div>
    <div class="modal-body">
      <p *ngFor="let n of notifications; let last = last" [style.margin-bottom]="last ? '0' : '12px'">{{ n.message }}</p>
    </div>
    <div class="modal-footer">
      <button class="btn-primary" (click)="dismissNotifications()">Got it!</button>
    </div>
  </div>
</div>
